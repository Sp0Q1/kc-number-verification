name: Semgrep

# Static analysis with Semgrep community rule packs. Findings are uploaded as
# SARIF and show up under Security -> Code scanning, alongside CodeQL.
#
# No SEMGREP_APP_TOKEN is required: the rule packs below are pulled from the
# public registry and the scan runs entirely in CI.
#
# Prefer OpenGrep (the Apache-2.0 fork of Semgrep)? It is a drop-in replacement.
# Swap the install and command for:
#     pip install opengrep        # or download the release binary
#     opengrep scan --config p/java --config p/security-audit \
#         --config p/secrets --sarif --output semgrep.sarif
# The rule-pack syntax and SARIF output are compatible.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "27 3 * * 2"

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install --upgrade semgrep

      - name: Run Semgrep
        # continue-on-error so a finding surfaces in the Security tab without
        # failing the workflow; tighten to a hard gate once the baseline is clean.
        continue-on-error: true
        run: |
          semgrep scan \
            --config p/java \
            --config p/security-audit \
            --config p/secrets \
            --config p/owasp-top-ten \
            --sarif --output semgrep.sarif

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
