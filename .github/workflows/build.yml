name: Build JAR

# Builds the provider JAR on GitHub's runners so you don't need a local
# Maven/JDK toolchain. The compiled .jar is attached to each run as a
# downloadable artifact, and to any tagged release as a release asset.

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}   # lets you trigger a build manually from the Actions tab

permissions:
  contents: write         # needed to attach the JAR to a release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven      # caches ~/.m2 so repeat builds are fast

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Upload the JAR as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: number-verification-jar
          path: target/number-verification.jar
          if-no-files-found: error

      - name: Attach the JAR to the release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/number-verification.jar
